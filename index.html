<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Browser</title>
</head>
<body>

<h1>My Browser</h1>

<input id="url" placeholder="URLを入力">
<button onclick="openPage()">開く</button>

<iframe
 id="viewer"
 width="100%"
 height="700">
</iframe>

<script>
function openPage() {
 const url =
 document.getElementById("url").value;

 document.getElementById("viewer").src =
 url;
}
</script>

</body>
</html>
